services:
  api:
    build: .
    ports: 
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
  
  frontend:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    command: streamlit run frontend/streamlit_app.py --server.port 8501 --server.address 0.0.0.0